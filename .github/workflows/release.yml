name: Release Desktop App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  # Run the full test suite first. The release build only proceeds if
  # tests pass. Uses `workflow_call` from .github/workflows/tests.yml so
  # the same jobs run identically on push, PR, and release.
  tests:
    uses: ./.github/workflows/tests.yml

  build:
    needs: tests
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS (universal binary for both Intel and Apple Silicon)
          - platform: macos-latest
            args: --target universal-apple-darwin
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
            os_label: macos
          # Linux
          - platform: ubuntu-24.04
            args: ""
            rust_targets: ""
            os_label: linux
          - platform: ubuntu-24.04-arm
            args: ""
            rust_targets: ""
            os_label: linux
          # Windows
          - platform: windows-latest
            args: ""
            rust_targets: ""
            os_label: windows
          - platform: windows-latest
            args: --target aarch64-pc-windows-msvc
            rust_targets: aarch64-pc-windows-msvc
            os_label: windows

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libx11-dev \
            libxcb-randr0-dev \
            libxcb-shm0-dev \
            libpipewire-0.3-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libgbm-dev \
            xdg-utils \
            rpm \
            zstd

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: ${{ matrix.rust_targets }}

      # Cache key is platform-based so it's shared with tests.yml's
      # Linux-native cache (same shared-key pattern). For mac/Windows
      # and cross-compile targets, each gets its own namespace.
      - name: Rust cache
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: "./clients/desktop/src-tauri -> target"
          shared-key: rust-${{ matrix.platform }}-${{ matrix.args || 'native' }}

      - name: Install dependencies
        run: npm ci

      - name: Build workspace dependencies
        run: |
          npm run build -w packages/shared
          npm run build -w clients/react

      - name: Build app (with signing)
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm run tauri build -- ${{ matrix.args }}
        working-directory: clients/desktop
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          VITE_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}

      - name: Build app (without signing)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: npm run tauri build -- ${{ matrix.args }}
        working-directory: clients/desktop
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          VITE_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}

      - name: Build Arch Linux package (.pkg.tar.zst)
        if: runner.os == 'Linux'
        run: |
          if [ -d "clients/desktop/src-tauri/target/release/bundle/deb" ]; then
            cd clients/desktop/src-tauri/target/release/bundle/deb
            for deb in *.deb; do
              if [ -f "$deb" ]; then
                echo "Building Arch package from $deb"
                DEB_FILE=$(basename "$deb")
                
                # Extract version from deb file name (e.g., lookout_0.0.26_amd64.deb -> 0.0.26)
                PKGVER=$(echo "$DEB_FILE" | grep -oP '([0-9]+\.[0-9]+\.[0-9]+)' | head -1)
                PKGVER=${PKGVER:-1.0.0}
                
                # Determine architecture
                if [[ "$DEB_FILE" == *"arm64"* || "$DEB_FILE" == *"aarch64"* ]]; then
                  ARCH="aarch64"
                else
                  ARCH="x86_64"
                fi
                
                mkdir -p arch_pkg
                cd arch_pkg
                ar x "../$DEB_FILE"
                
                if [ -f "data.tar.xz" ]; then
                  tar -xf data.tar.xz
                elif [ -f "data.tar.gz" ]; then
                  tar -xf data.tar.gz
                fi
                
                rm -f data.tar.* control.tar.* debian-binary
                
                SIZE=$(du -sb . | awk '{print $1}')
                
                echo "pkgname = lookout-bin" > .PKGINFO
                echo "pkgver = ${PKGVER}-1" >> .PKGINFO
                echo "pkgdesc = Lookout desktop app" >> .PKGINFO
                echo "url = https://github.com/hackclub/lookout" >> .PKGINFO
                echo "builddate = $(date +%s)" >> .PKGINFO
                echo "packager = GitHub Actions" >> .PKGINFO
                echo "size = ${SIZE}" >> .PKGINFO
                echo "arch = ${ARCH}" >> .PKGINFO
                echo "license = MIT" >> .PKGINFO
                echo "depend = cairo" >> .PKGINFO
                echo "depend = desktop-file-utils" >> .PKGINFO
                echo "depend = gdk-pixbuf2" >> .PKGINFO
                echo "depend = glib2" >> .PKGINFO
                echo "depend = gtk3" >> .PKGINFO
                echo "depend = hicolor-icon-theme" >> .PKGINFO
                echo "depend = libsoup" >> .PKGINFO
                echo "depend = pango" >> .PKGINFO
                echo "depend = webkit2gtk-4.1" >> .PKGINFO
                
                tar --zstd -cf "../lookout_${PKGVER}_${ARCH}.pkg.tar.zst" .PKGINFO *
                cd ..
                rm -rf arch_pkg
              fi
            done
          fi

      - name: Sign Windows binaries with Trusted Signing
        if: startsWith(github.ref, 'refs/tags/v') && runner.os == 'Windows' && !contains(matrix.args, 'aarch64')
        uses: azure/trusted-signing-action@v1.1.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: https://eus.codesigning.azure.net/
          trusted-signing-account-name: hackclub
          certificate-profile-name: hackatime-desktop
          files-folder: ${{ github.workspace }}/clients/desktop/src-tauri/target/release/bundle
          files-folder-filter: msi,exe
          files-folder-recurse: true
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Sign Windows ARM binaries with Trusted Signing
        if: startsWith(github.ref, 'refs/tags/v') && runner.os == 'Windows' && contains(matrix.args, 'aarch64')
        uses: azure/trusted-signing-action@v1.1.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: https://eus.codesigning.azure.net/
          trusted-signing-account-name: hackclub
          certificate-profile-name: hackatime-desktop
          files-folder: ${{ github.workspace }}/clients/desktop/src-tauri/target/aarch64-pc-windows-msvc/release/bundle
          files-folder-filter: msi,exe
          files-folder-recurse: true
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.platform }}-${{ matrix.args || 'native' }}
          path: |
            clients/desktop/src-tauri/target/*/release/bundle/**/*.dmg
            clients/desktop/src-tauri/target/*/release/bundle/**/*.app.tar.gz
            clients/desktop/src-tauri/target/release/bundle/**/*.dmg
            clients/desktop/src-tauri/target/release/bundle/**/*.app.tar.gz
            clients/desktop/src-tauri/target/release/bundle/**/*.deb
            clients/desktop/src-tauri/target/release/bundle/**/*.rpm
            clients/desktop/src-tauri/target/release/bundle/**/*.msi
            clients/desktop/src-tauri/target/release/bundle/**/*.exe
            clients/desktop/src-tauri/target/*/release/bundle/**/*.msi
            clients/desktop/src-tauri/target/*/release/bundle/**/*.exe
            clients/desktop/src-tauri/target/release/bundle/**/*.pkg.tar.zst
            clients/desktop/src-tauri/target/*/release/bundle/**/*.app.tar.gz.sig
            clients/desktop/src-tauri/target/release/bundle/**/*.app.tar.gz.sig
            clients/desktop/src-tauri/target/release/bundle/**/*.exe.sig
            clients/desktop/src-tauri/target/*/release/bundle/**/*.exe.sig
            clients/desktop/src-tauri/target/release/bundle/**/*.msi.sig
            clients/desktop/src-tauri/target/*/release/bundle/**/*.msi.sig

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Display artifacts
        run: ls -R artifacts

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Rename artifacts with OS labels
        run: |
          mkdir -p release-assets
          find artifacts -type f \( \
            -name "*.dmg" -o \
            -name "*.app.tar.gz" -o \
            -name "*.deb" -o \
            -name "*.rpm" -o \
            -name "*.msi" -o \
            -name "*.exe" -o \
            -name "*.pkg.tar.zst" -o \
            -name "*.app.tar.gz.sig" -o \
            -name "*.exe.sig" -o \
            -name "*.msi.sig" \
          \) | while read -r file; do
            FILENAME=$(basename "$file")
            # Determine OS label from artifact directory
            case "$file" in
              *macos*) OS="macos" ;;
              *ubuntu*) OS="linux" ;;
              *windows*) OS="windows" ;;
              *) OS="unknown" ;;
            esac
            # Normalize RPM names to match underscore convention used by other artifacts
            # Lookout-0.0.16-1.x86_64.rpm -> Lookout_0.0.16_x86_64.rpm
            if [[ "$FILENAME" == *.rpm ]]; then
              # Strip "Lookout-", version, release number; extract arch
              RPM_REST="${FILENAME#Lookout-}"       # 0.0.16-1.x86_64.rpm
              RPM_VER="${RPM_REST%%-[0-9].*}"        # 0.0.16
              RPM_ARCH="${RPM_REST##*-[0-9].}"       # x86_64.rpm
              FILENAME="Lookout_${RPM_VER}_${RPM_ARCH}"
            fi
            # Add OS label: Lookout_0.0.16_x64-setup.exe -> Lookout_linux-0.0.16_x64-setup.exe
            if [[ "$FILENAME" == *"_"* ]] && [[ "$FILENAME" != *"${OS}-"* ]]; then
              PREFIX="${FILENAME%%_*}"
              SUFFIX="${FILENAME#*_}"
              NEW_NAME="${PREFIX}_${OS}-${SUFFIX}"
            elif [[ "$FILENAME" != *"${OS}"* ]]; then
              # Files without underscores (e.g. Lookout.app.tar.gz) — prepend OS
              NEW_NAME="${OS}-${FILENAME}"
            else
              NEW_NAME="$FILENAME"
            fi
            echo "Renaming: $FILENAME -> $NEW_NAME"
            cp "$file" "release-assets/$NEW_NAME"
          done
          ls -la release-assets/

      - name: Generate update manifest (latest.json)
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          BASE_URL="https://github.com/hackclub/lookout/releases/download/v${VERSION}"

          # Read signatures from .sig files
          MAC_SIG=""
          WIN_X64_SIG=""
          WIN_ARM_SIG=""
          for sig_file in release-assets/*.sig; do
            [ -f "$sig_file" ] || continue
            SIG_CONTENT=$(cat "$sig_file")
            FILENAME=$(basename "$sig_file")
            case "$FILENAME" in
              *macos*.app.tar.gz.sig) MAC_SIG="$SIG_CONTENT" ;;
              *windows*aarch64*setup.exe.sig|*windows*arm*setup.exe.sig) WIN_ARM_SIG="$SIG_CONTENT" ;;
              *windows*setup.exe.sig) WIN_X64_SIG="$SIG_CONTENT" ;;
            esac
          done

          # Find actual updatable artifact filenames
          MAC_FILE=$(ls release-assets/*macos*.app.tar.gz 2>/dev/null | head -1 | xargs basename 2>/dev/null || echo "")
          WIN_X64_FILE=$(ls release-assets/*windows*setup.exe 2>/dev/null | grep -v -e aarch64 -e arm64 | head -1 | xargs basename 2>/dev/null || echo "")
          WIN_ARM_FILE=$(find release-assets -maxdepth 1 -name '*windows*setup.exe' | grep -e aarch64 -e arm64 | head -1 | xargs -r basename 2>/dev/null || echo "")

          # Build platforms JSON dynamically (only include platforms with artifacts)
          PLATFORMS="{"
          FIRST=true

          add_platform() {
            local key="$1" sig="$2" file="$3"
            [ -z "$sig" ] || [ -z "$file" ] && return
            if [ "$FIRST" = true ]; then FIRST=false; else PLATFORMS="$PLATFORMS,"; fi
            PLATFORMS="$PLATFORMS \"$key\": { \"signature\": \"$sig\", \"url\": \"$BASE_URL/$file\" }"
          }

          add_platform "darwin-universal" "$MAC_SIG" "$MAC_FILE"
          add_platform "darwin-x86_64" "$MAC_SIG" "$MAC_FILE"
          add_platform "darwin-aarch64" "$MAC_SIG" "$MAC_FILE"
          add_platform "windows-x86_64" "$WIN_X64_SIG" "$WIN_X64_FILE"
          add_platform "windows-aarch64" "$WIN_ARM_SIG" "$WIN_ARM_FILE"

          PLATFORMS="$PLATFORMS }"

          cat > release-assets/latest.json << ENDJSON
          {
            "version": "v${VERSION}",
            "notes": "See the assets to download and install.\n(You may need to click \"Show all\" after expanding the dropdown to see one compatible with your system)",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": ${PLATFORMS}
          }
          ENDJSON

          echo "Generated latest.json:"
          cat release-assets/latest.json

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"

          # Create draft release
          gh release create "$TAG" \
            --title "Lookout v${VERSION}" \
            --notes "See the assets to download and install.\n(You may need to click \"Show all\" after expanding the dropdown to see one compatible with your system)" \
            --draft

          # Upload all renamed artifacts
          for file in release-assets/*; do
            echo "Uploading: $file"
            gh release upload "$TAG" "$file" --clobber
          done
